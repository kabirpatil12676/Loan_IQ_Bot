<script>

/* ══════════════════════════════════════════════════
   LOANIQ — Webhook Based Chat Engine
   Frontend → Render Webhook → Dialogflow
══════════════════════════════════════════════════ */

const WEBHOOK_URL = "https://loaniq-webhook.onrender.com/webhook";

let waiting = false;
let stepNum = 1;

const box    = document.getElementById('messages');
const input  = document.getElementById('userInput');
const btn    = document.getElementById('sendBtn');


/* ── Auto resize ── */

input.addEventListener('input', () => {
  input.style.height='auto';
  input.style.height=Math.min(input.scrollHeight,120)+'px';
});

input.addEventListener('keydown', e => {
  if(e.key==='Enter'&&!e.shiftKey){
    e.preventDefault();
    sendMessage();
  }
});


/* ═══════════════════════════════════════════
   UI RENDER
═══════════════════════════════════════════ */

function botMsg(text, chips=[], resultData=null){

  const row = document.createElement('div');
  row.className='msg-row bot';

  let inner = `<div class="bubble bot">${fmt(text)}`;

  if(resultData){
    const c = scoreColor(resultData.pct);
    const uid = 'bar'+Date.now();

    inner += `
      <div class="result-card">
        <div class="res-score">${resultData.pct}%</div>
        <div class="res-label">Eligibility Score</div>
        <div class="res-bar-bg"><div class="res-bar" id="${uid}"></div></div>
        <div class="res-verdict" style="color:${c}">${resultData.verdict}</div>

        <div class="res-meta">
          <div class="res-meta-item">
          <strong>${resultData.emi}</strong>Est. EMI</div>

          <div class="res-meta-item">
          <strong>${resultData.dti}</strong>DTI Ratio</div>

          <div class="res-meta-item">
          <strong>${resultData.income}</strong>Total Income</div>
        </div>
      </div>
    `;

    setTimeout(()=>{
      const b=document.getElementById(uid);
      if(b) b.style.width=resultData.pct+'%';
    },150);
  }

  inner += '</div>';

  if(chips.length){
    inner += `
      <div class="chips">
        ${chips.map(c=>`
          <button class="chip"
          onclick="chipClick('${esc(c)}')">
          ${esc(c)}</button>`).join('')}
      </div>`;
  }

  row.innerHTML=`
  <div class="avatar bot">🏦</div>
  <div>${inner}</div>`;

  box.appendChild(row);
  scrollDown();
}


function userMsg(text){

  const row=document.createElement('div');
  row.className='msg-row user';

  row.innerHTML=`
  <div class="avatar user">👤</div>
  <div class="bubble user">${esc(text)}</div>`;

  box.appendChild(row);
  scrollDown();
}


function showTyping(){
  const t=document.createElement('div');
  t.className='typing-row';
  t.id='typ';

  t.innerHTML=`
  <div class="avatar bot">🏦</div>
  <div class="typing-bubble">
  <div class="tdot"></div>
  <div class="tdot"></div>
  <div class="tdot"></div>
  </div>`;

  box.appendChild(t);
  scrollDown();
}


function hideTyping(){
  const t=document.getElementById('typ');
  if(t) t.remove();
}


function scrollDown(){
  setTimeout(()=>box.scrollTop=box.scrollHeight,60);
}


/* ═══════════════════════════════════════════
   WEBHOOK CALL
═══════════════════════════════════════════ */

async function sendMessage(override){

  const text=(override??input.value).trim();

  if(!text||waiting) return;

  input.value='';
  input.style.height='auto';

  userMsg(text);

  setWait(true);
  showTyping();

  try{

    const response = await fetch(WEBHOOK_URL,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        queryResult:{
          queryText:text,
          parameters:{},
          intent:{
            displayName:"loan.calculate.result"
          }
        }
      })
    });

    const data = await response.json();

    hideTyping();

    const texts =
    data.fulfillmentMessages
    ?.map(m=>m.text?.text?.[0])
    .filter(Boolean) || [data.fulfillmentText];

    texts.forEach((t,i)=>{

      setTimeout(()=>{

        const rd=parseResultFromText(t);

        botMsg(
          t,
          [],
          rd
        );

      }, i*500);

    });

    setTimeout(()=>setWait(false),texts.length*500+100);

  }
  catch(err){

    hideTyping();
    setWait(false);

    botMsg(
      "⚠️ Connection issue. Please refresh."
    );
  }
}


/* ═══════════════════════════════════════════
   RESULT PARSER
═══════════════════════════════════════════ */

function parseResultFromText(t){

  const pctM=t.match(/Score:\s*(\d+)%/);

  if(!pctM) return null;

  const pct=parseInt(pctM[1]);

  const verdict=t.split('\n')[0];

  const emi=(t.match(/EMI:\s*([^\n]+)/)||[])[1]||"—";

  const dti=(t.match(/DTI:\s*([^\n]+)/)||[])[1]||"—";

  const income=(t.match(/Income:\s*([^\n]+)/)||[])[1]||"—";

  return {
    pct,
    verdict,
    emi,
    dti,
    income
  };
}


/* ═══════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════ */

function chipClick(t){
  sendMessage(t);
}

function setWait(v){
  waiting=v;
  btn.disabled=v;
  input.disabled=v;
}

function scoreColor(p){
  if(p>=80) return '#22c55e';
  if(p>=65) return '#84cc16';
  if(p>=50) return '#f59e0b';
  if(p>=35) return '#f97316';
  return '#ef4444';
}

function esc(s){
  return String(s)
  .replace(/&/g,'&amp;')
  .replace(/</g,'&lt;')
  .replace(/>/g,'&gt;')
  .replace(/"/g,'&quot;');
}

function fmt(s){
  return esc(s)
  .replace(/\n/g,'<br>')
  .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
}


/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */

window.addEventListener('load',()=>{

  botMsg(
    "👋 Welcome to LoanIQ!\n\nI'll evaluate your loan eligibility in 10 quick steps.\n\nReady to begin?",
    ["Yes, let's start!","How does it work?"]
  );

});

</script>
